---
kind: Service
apiVersion: v1
metadata:
  name: joplin
  namespace: default
  labels:
    app.kubernetes.io/name: joplin
spec:
  type: LoadBalancer
  allocateLoadBalancerNodePorts: false
  ports:
    - port: 22300
      targetPort: 22300
      protocol: TCP
      name: joplin-http
  selector:
    app.kubernetes.io/name: joplin


---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: joplin
  namespace: default
  labels:
    app.kubernetes.io/name: joplin
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: joplin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: joplin
    spec:
      # volumes:
      #   - name: joplin-data
      #     persistentVolumeClaim:
      #       claimName: phis-standard-joplin
      containers:
        - name: joplin
          image: joplin/server:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: joplin-config 
          env:
            - name: APP_BASE_URL
              value: https://joplin.perihelion.live
            - name: APP_PORT
              value: "22300"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: DB_PASS
          #   - name: STORAGE_DRIVER_Type
          #     value: Filesystem
          #   - name: Path
          #     value: /etc/joplin
          # volumeMounts:
          #   - name: joplin-data
          #     mountPath: '/etc/joplin'
          ports:
            - name: joplin-http
              containerPort: 22300
              protocol: TCP

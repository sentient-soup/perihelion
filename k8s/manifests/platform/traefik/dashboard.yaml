# Example A — exposing an internal service with an auth middleware.
# Routes traefik.perihelion.live to Traefik's built-in dashboard (api@internal),
# protected by the dashboard-auth basic-auth middleware. TLS via the default store.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.perihelion.live`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
      middlewares:
        - name: dashboard-auth
  tls: {}

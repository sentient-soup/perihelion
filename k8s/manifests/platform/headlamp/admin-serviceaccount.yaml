# Long-lived admin identity for Headlamp, so you don't mint a short-lived token
# every session. Retrieve the token (does not expire while this SA + Secret
# exist) and paste it into Headlamp's login prompt:
#
#   kubectl get secret headlamp-admin-token -n platform \
#     -o jsonpath='{.data.token}' | base64 -d; echo
#
# Treat it like a cluster-admin password — store it in a password manager.
# For a read-only UI, change the ClusterRoleBinding roleRef name to "view".
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-admin
  namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: headlamp-admin
    namespace: platform
---
# Manually-created token Secret: since k8s 1.24 a ServiceAccount no longer auto-
# generates one. The token controller fills in .data.token at runtime (which is
# why headlamp-config ignores diffs on this Secret's data).
apiVersion: v1
kind: Secret
metadata:
  name: headlamp-admin-token
  namespace: platform
  annotations:
    kubernetes.io/service-account.name: headlamp-admin
type: kubernetes.io/service-account-token

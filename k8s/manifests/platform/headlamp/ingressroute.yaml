# Example B — exposing a normal app that brings its own auth.
# Headlamp has token-based login, so no middleware is needed; this is the
# plain reverse-proxy pattern to copy for most services. The IngressRoute lives
# in the same namespace as the Service it targets (Traefik resolves services
# within the route's namespace). TLS via the default store in the traefik ns.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp
  namespace: platform
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`headlamp.perihelion.live`)
      kind: Rule
      services:
        - name: headlamp
          port: 80
  tls: {}

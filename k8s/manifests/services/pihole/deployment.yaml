apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: networking
  labels:
    app.kubernetes.io/name: pihole
    app.kubernetes.io/version: "2025.08.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pihole
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pihole
    spec:
      volumes:
        - name: pihole-data
          persistentVolumeClaim:
            claimName: phis-standard-pihole
      containers:
        - name: pihole
          image: pihole/pihole:2025.08.0
          imagePullPolicy: Always
          env:
            - name: TZ
              value: "America/Denver"
            - name: FTLCONF_webserver_api_password
              valueFrom:
                secretKeyRef:
                  name: pihole-secrets
                  key: PIHOLE_PASSWORD
            - name: FTLCONF_dns_upstreams
              value: "1.1.1.1;9.9.9.9"
          volumeMounts:
            - name: pihole-data
              mountPath: /etc/pihole
          ports:
            - name: pihole-http
              containerPort: 80
              protocol: TCP
            - name: pihole-https
              containerPort: 443
              protocol: TCP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
          securityContext:
            capabilities:
              add:
                - NET_ADMIN

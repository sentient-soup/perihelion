apiVersion: apps/v1
kind: Deployment
metadata:
  name: apseline-web
  namespace: apps
  labels:
    app.kubernetes.io/name: apseline-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apseline-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apseline-web
    spec:
      containers:
        - name: apseline-web
          image: ghcr.io/sentient-soup/apseline-web:master
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: networking
  labels:
    app.kubernetes.io/name: nginx
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx
    spec:
      volumes:
        - name: nginx-config
          persistentVolumeClaim:
            claimName: phis-standard-nginx
      containers:
        - name: nginx
          image: nginx:1.29.3
          imagePullPolicy: Always
          ports:
            - name: nginx-http
              containerPort: 80
              protocol: TCP
            - name: nginx-https
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/

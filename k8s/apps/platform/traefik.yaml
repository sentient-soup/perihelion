apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: "40.2.0"
    helm:
      values: |
        service:
          annotations:
            metallb.io/loadBalancerIPs: 192.168.1.226
        ingressClass:
          enabled: true
          isDefaultClass: true
        api:
          dashboard: true
          insecure: false
        # Dashboard is exposed via our own authenticated IngressRoute
        # (k8s/manifests/platform/traefik/dashboard.yaml), not the chart's
        # default unauthenticated one.
        ingressRoute:
          dashboard:
            enabled: false
        providers:
          kubernetesIngress:
            enabled: true
          kubernetesCRD:
            enabled: true
        logs:
          general:
            level: INFO
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

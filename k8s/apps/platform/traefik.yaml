apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: "40.2.0"
    helm:
      values: |
        service:
          spec:
            loadBalancerIP: 192.168.1.226
        ingressClass:
          enabled: true
          isDefaultClass: true
        api:
          dashboard: true
          insecure: false
        providers:
          kubernetesIngress:
            enabled: true
          kubernetesCRD:
            enabled: true
        logs:
          general:
            level: INFO
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

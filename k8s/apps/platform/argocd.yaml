apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-lb
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/sentient-soup/perihelion
    targetRevision: HEAD
    path: k8s/manifests/platform/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-config
  namespace: argocd
  annotations:
    # Runs after the cert-manager chart (wave -1) so the CRDs exist before
    # the ClusterIssuer is applied.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/sentient-soup/perihelion
    targetRevision: HEAD
    path: k8s/manifests/infra/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

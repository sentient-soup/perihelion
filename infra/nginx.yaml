---
apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    pv.kubernetes.io/provisioned-by: nfs.csi.k8s.io
  name: phis-standard-nginx
spec:
  capacity:
    storage: 10Mi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-csi
  mountOptions:
    - nfsvers=4.1
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: phis1#standard#nginx
    volumeAttributes:
      server: 192.168.1.212
      share: /media/storage/standard/nginx

---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: phis-standard-nginx
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Mi
  volumeName: phis-standard-nginx
  storageClassName: nfs-csi


---
kind: Service
apiVersion: v1
metadata:
  name: nginx
  namespace: default
  labels:
    app.kubernetes.io/name: nginx
spec:
  type: LoadBalancer
  allocateLoadBalancerNodePorts: false
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: nginx-http
    - port: 443
      targetPort: 443
      protocol: TCP
      name: nginx-https
  selector:
    app.kubernetes.io/name: nginx

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  selector:
    matchLabels:
      app: nginx
  replicas: 1
  template:
    metadata:
      labels:
        app: nginx
    spec:
      volumes:
        - name: nginx-data
          persistentVolumeClaim:
            claimName: phis-standard-nginx
      containers:
        - name: nginx
          image: nginx:1.29.3
          imagePullPolicy: Always
          volumeMounts:
            - name: nginx-data
              mountPath: '/etc/nginx/conf.d/'
          ports:
            - name: nginx-http
              containerPort: 80
              protocol: TCP
            - name: nginx-https
              containerPort: 443
              protocol: TCP